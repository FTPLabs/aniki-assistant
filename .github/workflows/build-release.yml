name: Build Aniki Windows EXE Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install core dependencies
        working-directory: aniki_assistant
        run: pip install PyQt6 requests pyttsx3 psutil pywin32

      - name: Install PyTorch CPU
        run: pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu

      - name: Install audio & speech dependencies
        run: pip install faster-whisper sounddevice numpy pycaw comtypes

      - name: Install PyInstaller
        run: pip install pyinstaller==6.9.0

      - name: Create icon (no display needed)
        working-directory: aniki_assistant
        shell: python
        run: |
          import sys, os
          sys.path.insert(0, '.')
          os.makedirs('resources', exist_ok=True)
          os.makedirs('data', exist_ok=True)
          try:
              import create_icon_ci
              create_icon_ci.make_ico('resources/aniki.ico', sizes=(16, 32, 48, 256))
          except Exception as e:
              print(f'Icon creation note: {e}')
              # Create minimal 1x1 ICO as absolute fallback
              with open('resources/aniki.ico', 'wb') as f:
                  import struct
                  f.write(b'\x00\x00\x01\x00\x01\x00\x01\x01\x00\x00\x01\x00\x18\x00(\x00\x00\x00\x16\x00\x00\x00')
              print('Fallback icon created')
          print('Icon step done')

      - name: Build EXE with PyInstaller
        working-directory: aniki_assistant
        shell: cmd
        run: |
          pyinstaller ^
            --name "Aniki" ^
            --onedir ^
            --windowed ^
            --icon "resources\aniki.ico" ^
            --add-data "resources;resources" ^
            --add-data "data;data" ^
            --hidden-import "PyQt6.QtCore" ^
            --hidden-import "PyQt6.QtWidgets" ^
            --hidden-import "PyQt6.QtGui" ^
            --hidden-import "PyQt6.sip" ^
            --hidden-import "pycaw.pycaw" ^
            --hidden-import "comtypes" ^
            --hidden-import "comtypes.client" ^
            --hidden-import "sounddevice" ^
            --hidden-import "faster_whisper" ^
            --hidden-import "sqlite3" ^
            --hidden-import "torch" ^
            --hidden-import "torchaudio" ^
            --hidden-import "numpy" ^
            --hidden-import "requests" ^
            --hidden-import "pyttsx3" ^
            --hidden-import "pyttsx3.drivers" ^
            --hidden-import "pyttsx3.drivers.sapi5" ^
            --hidden-import "win32com.client" ^
            --hidden-import "psutil" ^
            --collect-all "faster_whisper" ^
            --collect-all "ctranslate2" ^
            --noconfirm ^
            main.py

      - name: Verify build
        working-directory: aniki_assistant
        shell: cmd
        run: |
          if exist "dist\Aniki\Aniki.exe" (
            echo BUILD SUCCESS
            dir dist\Aniki\Aniki.exe
          ) else (
            echo BUILD FAILED - exe not found
            exit /b 1
          )

      - name: Create ZIP archive
        working-directory: aniki_assistant
        shell: powershell
        run: |
          Compress-Archive -Path dist\Aniki\* -DestinationPath dist\Aniki-Windows-x64.zip -Force
          $size = (Get-Item dist\Aniki-Windows-x64.zip).Length / 1MB
          Write-Host "ZIP created: $([math]::Round($size, 1)) MB"

      - name: Get version
        id: get_version
        shell: powershell
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            echo "VERSION=${{ github.event.inputs.version }}" >> $env:GITHUB_OUTPUT
          } else {
            echo "VERSION=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
          }

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: "🤜 Аники ${{ steps.get_version.outputs.VERSION }} — Windows EXE"
          body: |
            ## 🤜 Аники — ИИ-ассистент Билли Херрингтона

            > *"Are you ready? Let's go!"*

            ### 📦 Установка
            1. Скачай `Aniki-Windows-x64.zip`
            2. Распакуй в любую папку
            3. Установи [Ollama](https://ollama.com) → запусти `ollama run mistral`
            4. Запусти `Aniki.exe`

            ### ✨ Возможности
            - 💬 ИИ-чат на русском с гачимучи-фразами (Ollama + Mistral, **полностью офлайн**)
            - 🎤 Распознавание речи offline (faster-whisper)
            - 🔊 Нейросетевой TTS на русском (Silero)
            - 🖥️ Команды: звук, браузер, Discord, Steam, YouTube
            - 💾 Память о тебе (SQLite)
            - ⏰ Напоминания: вода, перерывы, игровое время
            - 🔔 Системный трей — работает в фоне

            ### 🛠️ Требования
            - Windows 10/11 x64
            - [Ollama](https://ollama.com) для ИИ (~4GB Mistral модель)

            ### ⚠️ Первый запуск
            SmartScreen может предупредить — нажми **Подробнее → Выполнить**

            ---
            *Wrestle with the best, die like the rest!* 🤜
          files: aniki_assistant/dist/Aniki-Windows-x64.zip
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
