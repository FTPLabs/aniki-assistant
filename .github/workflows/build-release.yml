name: Build Windows EXE

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install "pyinstaller==6.4.0"

      - name: Install runtime deps (CPU torch)
        run: |
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install "PyQt6>=6.6.0" requests numpy psutil sounddevice soundfile
          pip install "faster-whisper>=1.0.0" pyttsx3 pygame webrtcvad pyaudio
          pip install pycaw comtypes pywin32 "Pillow>=10.0.0"

      - name: Create app icon
        working-directory: aniki_assistant
        run: python create_icon_ci.py

      # FIX H4: используем aniki.spec с обновлёнными hiddenimports вместо флагов
      # FIX C2: добавлены --collect-all torch, torchaudio, silero для работы TTS в .exe
      - name: Bundle with PyInstaller (via spec)
        working-directory: aniki_assistant
        run: |
          pyinstaller aniki.spec ^
            --noconfirm ^
            --collect-all torch ^
            --collect-all torchaudio ^
            --collect-all faster_whisper ^
            --collect-all sounddevice ^
            --collect-all ctranslate2 ^
            --collect-all omegaconf ^
            --hidden-import win32com.client ^
            --hidden-import win32api ^
            --hidden-import webrtcvad ^
            --hidden-import pyaudio
        shell: cmd

      - name: Verify EXE
        run: |
          if (Test-Path "aniki_assistant/dist/Aniki/Aniki.exe") {
            $size = (Get-Item "aniki_assistant/dist/Aniki/Aniki.exe").Length / 1MB
            Write-Host "✓ Aniki.exe: $([math]::Round($size,1)) MB"
          } elseif (Test-Path "aniki_assistant/dist/Aniki.exe") {
            $size = (Get-Item "aniki_assistant/dist/Aniki.exe").Length / 1MB
            Write-Host "✓ Aniki.exe (onefile): $([math]::Round($size,1)) MB"
          } else {
            Write-Error "Aniki.exe not found!"
            exit 1
          }

      - name: Zip release bundle
        run: |
          if (Test-Path "aniki_assistant/dist/Aniki") {
            Compress-Archive -Path "aniki_assistant/dist/Aniki/*" -DestinationPath "Aniki-Windows.zip"
          } else {
            Compress-Archive -Path "aniki_assistant/dist/Aniki.exe" -DestinationPath "Aniki-Windows.zip"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aniki-Windows-${{ github.sha }}
          path: Aniki-Windows.zip
          retention-days: 30

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Aniki-Windows.zip
          generate_release_notes: true
          body: |
            ## Аники ${{ github.ref_name }}

            **Исправления в этом релизе:**
            - [CRITICAL] Исправлен crash в `transcribe_audio_file` при незагруженном Whisper
            - [CRITICAL] TTS (Silero/torch) теперь полностью включён в .exe сборку
            - [HIGH] Устранена утечка потоков AIWorker при голосовом вводе во время ответа ИИ
            - [HIGH] `speak()` теперь использует публичный API вместо приватных функций
            - [HIGH] `Pillow` добавлен в зависимости — скриншоты работают из коробки
            - [HIGH] `.spec` файл теперь используется в CI для полного контроля сборки
            - [HIGH] Исправлен двойной COMMIT в `memory.py` при `executescript`
            - [MEDIUM] Рассинхронизация кнопки mic и чекбокса VAD устранена
            - [MEDIUM] `block_cipher` удалён из `aniki.spec` (устарел в PyInstaller 6.x)

            **Установка:**
            1. Установи [Ollama](https://ollama.com)
            2. В cmd: `ollama run mistral`
            3. Распакуй архив и запусти `Aniki.exe`

            **Требования:** Windows 10/11 x64, микрофон (опционально)
