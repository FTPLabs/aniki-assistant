name: Build Windows EXE

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-v5-${{ hashFiles('aniki_assistant/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-v5-

      - name: Cache PyInstaller dist
        id: cache-dist
        uses: actions/cache@v4
        with:
          path: aniki_assistant/dist
          key: ${{ runner.os }}-dist-v5-${{ hashFiles('aniki_assistant/aniki.spec', 'aniki_assistant/requirements.txt', 'aniki_assistant/**/*.py') }}

      - name: Cache PyInstaller analysis
        if: steps.cache-dist.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: aniki_assistant/build
          key: ${{ runner.os }}-pyinstaller-v5-${{ hashFiles('aniki_assistant/aniki.spec') }}
          restore-keys: |
            ${{ runner.os }}-pyinstaller-v5-

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install "pyinstaller==6.4.0"

      - name: Install runtime deps (CPU torch)
        run: |
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install "PyQt6>=6.6.0" requests numpy psutil sounddevice soundfile
          pip install "faster-whisper>=1.0.0" pyttsx3 pygame "Pillow>=10.0.0"
          pip install pycaw comtypes pywin32 webrtcvad-wheels pyaudio

      - name: Create app icon
        working-directory: aniki_assistant
        run: python create_icon_ci.py

      - name: Bundle with PyInstaller
        if: steps.cache-dist.outputs.cache-hit != 'true'
        working-directory: aniki_assistant
        run: pyinstaller aniki.spec --noconfirm
        shell: cmd

      - name: Skip build notice
        if: steps.cache-dist.outputs.cache-hit == 'true'
        run: echo "cache-hit - PyInstaller skipped"

      - name: Verify EXE exists
        shell: pwsh
        run: |
          $paths = @("aniki_assistant/dist/Aniki/Aniki.exe", "aniki_assistant/dist/Aniki.exe")
          $found = $false
          foreach ($p in $paths) {
            if (Test-Path $p) {
              $size = [math]::Round((Get-Item $p).Length / 1MB, 1)
              Write-Host "OK Aniki.exe: $size MB"
              $found = $true; break
            }
          }
          if (-not $found) { Write-Error "Aniki.exe not found!"; exit 1 }

      # Smoke test: запуск EXE на 5 сек с захватом вывода в файлы.
      # stdout/stderr редиректим в tmp-файлы (нет проблем с PowerShell Runspace).
      # Краш сразу (exit != 0) = missing DLL / ошибка импорта / падение при старте.
      # Всё ещё работает после 5с = GUI OK.
      - name: Smoke test EXE (no crash on startup)
        shell: pwsh
        run: |
          $paths = @("aniki_assistant/dist/Aniki/Aniki.exe", "aniki_assistant/dist/Aniki.exe")
          $exe = $null
          foreach ($p in $paths) { if (Test-Path $p) { $exe = (Resolve-Path $p).Path; break } }
          Write-Host "=== Smoke test: $exe ==="

          $tmpOut = [System.IO.Path]::GetTempFileName()
          $tmpErr = [System.IO.Path]::GetTempFileName()

          # Start-Process перенаправляет stdout/stderr в файлы — без Runspace-проблем
          $proc = Start-Process -FilePath $exe `
            -RedirectStandardOutput $tmpOut `
            -RedirectStandardError $tmpErr `
            -WindowStyle Hidden `
            -PassThru

          # Ждём 5 секунд
          $exited = $proc.WaitForExit(5000)

          # Читаем захваченный вывод из файлов
          $outContent = Get-Content $tmpOut -ErrorAction SilentlyContinue | Select-Object -First 30
          $errContent = Get-Content $tmpErr -ErrorAction SilentlyContinue

          if ($outContent) {
            Write-Host "--- STDOUT (first 30 lines) ---"
            $outContent | ForEach-Object { Write-Host $_ }
          }
          if ($errContent) {
            Write-Host "--- STDERR ---"
            $errContent | ForEach-Object { Write-Host $_ }
          }

          Remove-Item $tmpOut, $tmpErr -ErrorAction SilentlyContinue

          if ($exited) {
            $code = $proc.ExitCode
            if ($code -ne 0) {
              Write-Error "SMOKE TEST FAILED: EXE exited with code $code (see STDERR above)"
              exit 1
            }
            Write-Host "OK: EXE exited cleanly (code 0)"
          } else {
            Write-Host "OK: EXE still running after 5s (GUI app healthy)"
            $proc.Kill()
            $proc.WaitForExit(2000) | Out-Null
          }

      - name: Zip release bundle
        shell: pwsh
        run: |
          if (Test-Path "aniki_assistant/dist/Aniki") {
            Compress-Archive -Path "aniki_assistant/dist/Aniki/*" -DestinationPath "Aniki-Windows.zip"
          } else {
            Compress-Archive -Path "aniki_assistant/dist/Aniki.exe" -DestinationPath "Aniki-Windows.zip"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aniki-Windows-${{ github.sha }}
          path: Aniki-Windows.zip
          retention-days: 30

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Aniki-Windows.zip
          generate_release_notes: false
          body: |
            ## Аники ${{ github.ref_name }}

            **Установка:**
            1. Установи [Ollama](https://ollama.com)
            2. В cmd: `ollama run mistral`
            3. Распакуй архив, запусти `Aniki.exe`

            **Требования:** Windows 10/11 x64
