name: Build Windows EXE

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install "pyinstaller==6.4.0"

      - name: Install runtime deps (CPU torch)
        run: |
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install "PyQt6>=6.6.0" requests numpy psutil sounddevice soundfile
          pip install "faster-whisper>=1.0.0" pyttsx3 pygame "Pillow>=10.0.0"
          pip install pycaw comtypes pywin32 webrtcvad pyaudio

      - name: Create app icon
        working-directory: aniki_assistant
        run: python create_icon_ci.py

      - name: Bundle with PyInstaller
        working-directory: aniki_assistant
        run: pyinstaller aniki.spec --noconfirm
        shell: cmd

      - name: Verify EXE
        shell: pwsh
        run: |
          $paths = @(
            "aniki_assistant/dist/Aniki/Aniki.exe",
            "aniki_assistant/dist/Aniki.exe"
          )
          $found = $false
          foreach ($p in $paths) {
            if (Test-Path $p) {
              $size = [math]::Round((Get-Item $p).Length / 1MB, 1)
              Write-Host "OK Aniki.exe: $size MB — $p"
              $found = $true
              break
            }
          }
          if (-not $found) { Write-Error "Aniki.exe not found!"; exit 1 }

      - name: Zip release bundle
        shell: pwsh
        run: |
          if (Test-Path "aniki_assistant/dist/Aniki") {
            Compress-Archive -Path "aniki_assistant/dist/Aniki/*" -DestinationPath "Aniki-Windows.zip"
          } else {
            Compress-Archive -Path "aniki_assistant/dist/Aniki.exe" -DestinationPath "Aniki-Windows.zip"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aniki-Windows-${{ github.sha }}
          path: Aniki-Windows.zip
          retention-days: 30

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Aniki-Windows.zip
          generate_release_notes: true
          body: |
            ## Аники ${{ github.ref_name }}

            **Исправления:**
            - [CRITICAL] Crash в `transcribe_audio_file` при незагруженном Whisper — устранён
            - [CRITICAL] TTS (Silero/torch) теперь полностью включён в .exe через `collect_all`
            - [HIGH] Утечка потоков AIWorker при голосовом вводе во время ответа ИИ — устранена
            - [HIGH] `chat_window` использует публичный `speak()` вместо приватных функций
            - [HIGH] `Pillow` добавлен в зависимости — скриншоты работают из коробки
            - [HIGH] `.spec` с `collect_all` используется в CI вместо флагов командной строки
            - [HIGH] Двойной COMMIT в `memory.py` при `executescript` — исправлен
            - [MEDIUM] Рассинхронизация кнопки mic / чекбокса VAD — исправлена
            - [MEDIUM] `block_cipher` удалён из `aniki.spec` (устарел в PyInstaller 6.x)

            **Установка:**
            1. Установи [Ollama](https://ollama.com)
            2. В cmd: `ollama run mistral`
            3. Распакуй архив, запусти `Aniki.exe`

            **Требования:** Windows 10/11 x64
