name: Build Windows EXE

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── Кэш 1: установленные пакеты (site-packages) ────────────────────────
      # Ключ: ОС + хэш requirements.txt → при изменении зависимостей кэш сбрасывается
      - name: Cache site-packages
        id: cache-pkgs
        uses: actions/cache@v4
        with:
          path: C:\hostedtoolcache\windows\Python\3.11.9\x64\Lib\site-packages
          key: ${{ runner.os }}-py311-site-v2-${{ hashFiles('aniki_assistant/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-py311-site-v2-

      # ── Кэш 2: PyInstaller build/ (анализ torch — самый медленный шаг) ──────
      - name: Cache PyInstaller analysis
        uses: actions/cache@v4
        with:
          path: aniki_assistant/build
          key: ${{ runner.os }}-pyinstaller-v2-${{ hashFiles('aniki_assistant/aniki.spec') }}
          restore-keys: |
            ${{ runner.os }}-pyinstaller-v2-

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install "pyinstaller==6.4.0"

      # Устанавливаем пакеты ТОЛЬКО если кэш site-packages промахнулся
      - name: Install runtime deps (CPU torch)
        if: steps.cache-pkgs.outputs.cache-hit != 'true'
        run: |
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install "PyQt6>=6.6.0" requests numpy psutil sounddevice soundfile
          pip install "faster-whisper>=1.0.0" pyttsx3 pygame "Pillow>=10.0.0"
          pip install pycaw comtypes pywin32 webrtcvad pyaudio

      - name: Create app icon
        working-directory: aniki_assistant
        run: python create_icon_ci.py

      # Сборка: если build/ кэширован — PyInstaller пропускает анализ, ~5 мин вместо 30
      - name: Bundle with PyInstaller
        working-directory: aniki_assistant
        run: pyinstaller aniki.spec --noconfirm
        shell: cmd

      - name: Verify EXE
        shell: pwsh
        run: |
          $paths = @(
            "aniki_assistant/dist/Aniki/Aniki.exe",
            "aniki_assistant/dist/Aniki.exe"
          )
          $found = $false
          foreach ($p in $paths) {
            if (Test-Path $p) {
              $size = [math]::Round((Get-Item $p).Length / 1MB, 1)
              Write-Host "OK Aniki.exe: $size MB — $p"
              $found = $true
              break
            }
          }
          if (-not $found) { Write-Error "Aniki.exe not found!"; exit 1 }

      - name: Zip release bundle
        shell: pwsh
        run: |
          if (Test-Path "aniki_assistant/dist/Aniki") {
            Compress-Archive -Path "aniki_assistant/dist/Aniki/*" -DestinationPath "Aniki-Windows.zip"
          } else {
            Compress-Archive -Path "aniki_assistant/dist/Aniki.exe" -DestinationPath "Aniki-Windows.zip"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aniki-Windows-${{ github.sha }}
          path: Aniki-Windows.zip
          retention-days: 30

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Aniki-Windows.zip
          generate_release_notes: true
          body: |
            ## Аники ${{ github.ref_name }}

            **Исправления v2.3.3:**
            - [CRITICAL] Бесконечный спаун процессов при запуске — исправлен
              - `multiprocessing.freeze_support()` добавлен первой строкой `main.py`
              - `auto_setup.py`: pip-вызовы в frozen exe пропускаются (был infinite loop)
            - Оптимизация CI: кэш site-packages + кэш PyInstaller build/ (~10 мин вместо 40)

            **Установка:**
            1. Установи [Ollama](https://ollama.com)
            2. В cmd: `ollama run mistral`
            3. Распакуй архив, запусти `Aniki.exe`

            **Требования:** Windows 10/11 x64
