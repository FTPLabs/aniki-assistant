name: Build Windows EXE

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller==6.4.0

      - name: Install runtime deps (CPU torch)
        run: |
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install PyQt6>=6.6.0 requests numpy psutil sounddevice soundfile faster-whisper pyttsx3 pygame
          pip install pycaw comtypes pywin32

      - name: Create app icon
        working-directory: aniki_assistant
        run: python create_icon_ci.py

      - name: Bundle with PyInstaller
        working-directory: aniki_assistant
        run: |
          pyinstaller ^
            --name "Aniki" ^
            --onefile ^
            --windowed ^
            --icon "resources/aniki.ico" ^
            --add-data "resources;resources" ^
            --add-data "data;data" ^
            --hidden-import PyQt6.sip ^
            --hidden-import PyQt6.QtCore ^
            --hidden-import PyQt6.QtWidgets ^
            --hidden-import PyQt6.QtGui ^
            --hidden-import pyttsx3.drivers ^
            --hidden-import pyttsx3.drivers.sapi5 ^
            --collect-all faster_whisper ^
            --collect-all sounddevice ^
            main.py
        shell: cmd

      - name: Verify EXE
        run: |
          if (Test-Path "aniki_assistant/dist/Aniki.exe") {
            $size = (Get-Item "aniki_assistant/dist/Aniki.exe").Length / 1MB
            Write-Host "✓ Aniki.exe: $([math]::Round($size,1)) MB"
          } else {
            Write-Error "Aniki.exe not found!"
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aniki-Windows-${{ github.sha }}
          path: aniki_assistant/dist/Aniki.exe
          retention-days: 30

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: aniki_assistant/dist/Aniki.exe
          generate_release_notes: true
          body: |
            ## Аники v${{ github.ref_name }}

            **Что нового:**
            - Умный парсинг команд (не путает "канал на Rust" с "запусти Rust")
            - Стриминг TTS — говорит сразу с первого предложения
            - Аватар Билли Херрингтона (реальное фото)
            - Потокобезопасная SQLite БД
            - Исправлены все найденные баги
            - Авто-установка зависимостей при старте

            **Установка:**
            1. Установи [Ollama](https://ollama.com)
            2. В cmd: `ollama run mistral`
            3. Запусти `Aniki.exe`
